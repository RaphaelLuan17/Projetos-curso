/* IMAGENS */
img {

/* BOTÕES */

  background: #fff;
  color: #000;
}

/* PROGRESS */

  transition: width 0.4s ease;
}

/* RESULTADO */

  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 20px;
  margin-top: 15px;
  border: 4px solid #fff;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(15px);}
  to {opacity:1; transform: translateY(0);}
}

/* CAROUSEL */
.carousel {
  max-width: 1200px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
}
.carousel-item {
  height: 400px;
}
.carousel-item img {
  height: 100%;
  object-fit: cover;
  filter: brightness(70%);
}
.carousel-caption h2 {

<!-- QUIZ -->
<div class="container py-5">
<div class="card shadow p-4 text-center">

<h2 class="mb-4">Qual jogador você é? ⚽</h2>

<div class="progress mb-4">
<div id="progressBar" class="progress-bar bg-success" style="width:0%"></div>
</div>

<div id="quiz">
<h5 id="question"></h5>
<div id="options" class="mt-3"></div>
</div>

<div id="result" class="mt-4 d-none"></div>

<button id="restartBtn" class="btn btn-warning mt-3 d-none">
Refazer Quiz
</button>

</div>
</div>

<script>
const questions = [
{
text:"1. Qual sua posição?",
options:[
{ text:"Ponta rápido", type:"Vini"},
{ text:"Atacante decisivo", type:"Rodrygo"},
{ text:"Meia criativo", type:"Neymar"},
{ text:"Volante", type:"Casemiro"},
{ text:"Zagueiro", type:"Marquinhos"},
{ text:"Goleiro", type:"Alisson"}
]
},
{
text:"2. Seu ponto forte?",
options:[
{ text:"Drible", type:"Neymar"},
{ text:"Velocidade", type:"Vini"},
{ text:"Decisão", type:"Rodrygo"},
{ text:"Marcação", type:"Casemiro"},
{ text:"Defesa", type:"Marquinhos"},
{ text:"Reflexo", type:"Alisson"}
]
},
{
text:"3. Personalidade?",
options:[
{ text:"Showman", type:"Neymar"},
{ text:"Alegre", type:"Vini"},
{ text:"Frio", type:"Rodrygo"},
{ text:"Líder", type:"Casemiro"},
{ text:"Calmo", type:"Marquinhos"},
{ text:"Seguro", type:"Alisson"}
]
}
];

let index = 0;
let scores = {
Neymar:0, Vini:0, Rodrygo:0,
Casemiro:0, Marquinhos:0, Alisson:0
};

const players = {
Neymar:{name:"Neymar Jr.", img:"img/n.jpg", desc:"Você é habilidoso e criativo!"},
Vini:{name:"Vini Jr.", img:"img/v.jpg", desc:"Velocidade absurda!"},
Rodrygo:{name:"Rodrygo", img:"img/r.jpg", desc:"Decisivo nos momentos importantes!"},
Casemiro:{name:"Casemiro", img:"img/c.jpg", desc:"Raça e liderança!"},
Marquinhos:{name:"Marquinhos", img:"img/m.jpg", desc:"Defensor inteligente!"},
Alisson:{name:"Alisson Becker", img:"img/a.jpg", desc:"Segurança total no gol!"}
};

function loadQuestion(){
if(index >= questions.length) return showResult();

let q = questions[index];
document.getElementById("question").innerText = q.text;

let html = "";
q.options.forEach(opt=>{
html += `<button class="btn btn-light w-100 my-2 option-btn"
onclick="answer('${opt.type}')">${opt.text}</button>`;
});

document.getElementById("options").innerHTML = html;

/* PROGRESSO CORRIGIDO */
let progress = ((index+1)/questions.length)*100;
document.getElementById("progressBar").style.width = progress + "%";
}

function answer(type){
scores[type]++;
index++;
loadQuestion();
}

function showResult(){
document.getElementById("quiz").classList.add("d-none");

let max = Math.max(...Object.values(scores));
let winners = Object.keys(scores).filter(p=>scores[p]===max);
let final = winners[Math.floor(Math.random()*winners.length)];

let p = players[final];

document.getElementById("result").innerHTML = `
<h3 class="fw-bold">${p.name}</h3>
<img src="${p.img}">
<p class="mt-3">${p.desc}</p>
`;

document.getElementById("result").classList.remove("d-none");
document.getElementById("restartBtn").classList.remove("d-none");
}

document.getElementById("restartBtn").onclick = ()=>{
index=0;
scores={Neymar:0,Vini:0,Rodrygo:0,Casemiro:0,Marquinhos:0,Alisson:0};

document.getElementById("quiz").classList.remove("d-none");
document.getElementById("result").classList.add("d-none");
document.getElementById("restartBtn").classList.add("d-none");

loadQuestion();
};

loadQuestion();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
